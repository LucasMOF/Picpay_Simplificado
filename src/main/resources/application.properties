spring.application.name=picpaySimplificado

# Configuraþ§es do Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:picpaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console do H2 (Acesse em: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraþ§es do Hibernate/JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Cria/Atualiza as tabelas automaticamente com base nas suas entidades @Entity
spring.jpa.hibernate.ddl-auto=update